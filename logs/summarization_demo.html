<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RLM Trace Visualizer</title>
<style>
/* ---- Reset & base ---- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --bg-card: #1a1d27;
  --bg-card-hover: #22263a;
  --border: #2a2e3e;
  --text: #e4e4e7;
  --text-muted: #71717a;
  --primary: #6366f1;
  --primary-light: #818cf8;
  --green: #22c55e;
  --yellow: #eab308;
  --cyan: #06b6d4;
  --magenta: #d946ef;
  --red: #ef4444;
  --orange: #f97316;
  --code-bg: #0d0f14;
  --role-system: #64748b;
  --role-user: #3b82f6;
  --role-assistant: #22c55e;
  --role-tool: #f97316;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

.light {
  --bg: #fafafa;
  --bg-card: #ffffff;
  --bg-card-hover: #f4f4f5;
  --border: #e4e4e7;
  --text: #18181b;
  --text-muted: #71717a;
  --code-bg: #f4f4f5;
}

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  overflow: hidden;
  height: 100vh;
}

/* ---- Layout ---- */
.app { display: flex; flex-direction: column; height: 100vh; }

.header {
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  background: var(--bg-card);
}
.header h1 { font-size: 18px; font-weight: 700; }
.header h1 .accent { color: var(--primary); }
.header h1 .sub { color: var(--text-muted); font-weight: 400; margin-left: 8px; }
.header-right { display: flex; align-items: center; gap: 12px; }

.stats-bar {
  display: flex;
  gap: 8px;
  padding: 10px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.stat-card {
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  min-width: 100px;
  text-align: center;
}
.stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
.stat-value { font-size: 20px; font-weight: 700; font-family: var(--font-mono); }
.stat-value.cyan { color: var(--cyan); }
.stat-value.green { color: var(--green); }
.stat-value.magenta { color: var(--magenta); }
.stat-value.yellow { color: var(--yellow); }

.answer-bar {
  padding: 10px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
  flex-shrink: 0;
}
.answer-bar .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.answer-bar .value { font-size: 14px; color: var(--green); font-weight: 500; white-space: pre-wrap; word-break: break-word; max-height: 40vh; overflow-y: auto; }
.answer-bar .value.collapsed { max-height: 3.6em; overflow: hidden; position: relative; }
.answer-bar .value.collapsed::after { content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 1.8em; background: linear-gradient(transparent, var(--bg-card)); pointer-events: none; }
.answer-toggle {
  font-size: 11px; color: var(--primary-light); cursor: pointer; border: none;
  background: none; padding: 2px 8px; border-radius: 4px; font-family: var(--font-sans);
  white-space: nowrap;
}
.answer-toggle:hover { background: var(--bg-card-hover); text-decoration: underline; }

.main-panels {
  flex: 1;
  display: flex;
  min-height: 0;
  overflow: hidden;
}

/* ---- Tree Panel (left) ---- */
.tree-panel {
  width: 400px;
  min-width: 280px;
  max-width: 50vw;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  background: var(--bg-card);
  flex-shrink: 0;
  resize: horizontal;
  overflow: auto;
}
.tree-panel-header {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}
.tree-content {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

/* ---- Tree node ---- */
.tree-node { margin-left: 0; }
.tree-node .children { margin-left: 20px; border-left: 1px solid var(--border); padding-left: 4px; }

.node-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.15s;
  border: 1px solid transparent;
}
.node-row:hover { background: var(--bg-card-hover); }
.node-row.selected {
  background: var(--bg-card-hover);
  border-color: var(--primary);
}

.node-toggle {
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: var(--text-muted);
  border: none;
  background: none;
  cursor: pointer;
  flex-shrink: 0;
  border-radius: 4px;
  transition: background 0.15s, color 0.15s;
}
.node-toggle:hover { background: var(--border); color: var(--text); }

.node-depth {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--primary);
  color: #fff;
  flex-shrink: 0;
}

.node-task {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 12px;
}

.node-duration {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  flex-shrink: 0;
}

.node-badge {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
  flex-shrink: 0;
  font-weight: 600;
}
.node-badge.leaf { background: var(--green); color: #fff; }
.node-badge.recursive { background: var(--magenta); color: #fff; }

/* ---- Detail Panel (right) ---- */
.detail-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}
.detail-panel-header {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  background: var(--bg-card);
}
.detail-content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
.detail-placeholder {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-muted);
  font-size: 14px;
}

.detail-section {
  margin-bottom: 20px;
}
.detail-section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  user-select: none;
}
.detail-section-title .chevron {
  font-size: 10px;
  transition: transform 0.15s;
}
.detail-section-title .chevron.collapsed { transform: rotate(-90deg); }
.detail-section-body { }
.detail-section-body.collapsed { display: none; }

.detail-field {
  display: grid;
  grid-template-columns: 100px 1fr;
  gap: 4px;
  margin-bottom: 6px;
  font-size: 13px;
}
.detail-field .label { color: var(--text-muted); font-size: 11px; }
.detail-field .value { word-break: break-word; }

.detail-text-block {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 400px;
  overflow-y: auto;
}

/* ---- LLM Messages ---- */
.llm-request {
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 12px;
  overflow: hidden;
}
.llm-request-header {
  padding: 8px 12px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-family: var(--font-mono);
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}
.llm-request-header:hover { background: var(--bg-card-hover); }

.phase-badge {
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 3px;
  font-weight: 600;
}
.phase-badge.agent_step { background: var(--primary); color: #fff; }
.phase-badge.plain_completion { background: var(--orange); color: #fff; }

.llm-messages { padding: 8px; }

.message-bubble {
  margin-bottom: 8px;
  border-radius: 8px;
  border: 1px solid var(--border);
  overflow: hidden;
}
.message-role {
  padding: 4px 10px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.message-role.system { background: var(--role-system); color: #fff; }
.message-role.user { background: var(--role-user); color: #fff; }
.message-role.assistant { background: var(--role-assistant); color: #fff; }
.message-role.tool-call { background: var(--role-tool); color: #fff; }
.message-role.tool-response { background: var(--role-tool); color: #fff; }

.message-content {
  padding: 10px;
  font-size: 12px;
  font-family: var(--font-mono);
  word-break: break-word;
  max-height: 500px;
  overflow-y: auto;
  line-height: 1.6;
  background: var(--code-bg);
}

/* ---- Agent Steps ---- */
.agent-step {
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 12px;
  overflow: hidden;
}
.agent-step-header {
  padding: 8px 12px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-family: var(--font-mono);
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}
.agent-step-header:hover { background: var(--bg-card-hover); }
.step-badge {
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 3px;
  font-weight: 600;
  background: var(--cyan);
  color: #fff;
}
.step-badge.final { background: var(--green); }
.step-badge.error { background: var(--red); }
.agent-step-body { padding: 8px; }
.agent-step-block-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  margin: 8px 0 4px 0;
}
.agent-step-block-label:first-child { margin-top: 0; }
.agent-step-code {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 300px;
  overflow-y: auto;
}
.agent-step-observation {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 200px;
  overflow-y: auto;
  color: var(--cyan);
}

/* ---- Theme toggle ---- */
.theme-btn {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  transition: background 0.15s;
}
.theme-btn:hover { background: var(--bg-card-hover); }

/* ---- Scrollbars ---- */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ---- Keyboard hint footer ---- */
.footer {
  padding: 4px 24px;
  border-top: 1px solid var(--border);
  font-size: 10px;
  color: var(--text-muted);
  text-align: center;
  flex-shrink: 0;
  background: var(--bg-card);
}
kbd {
  padding: 1px 5px;
  border-radius: 3px;
  background: var(--bg);
  border: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 9px;
}

/* ---- Empty state ---- */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-muted);
  gap: 8px;
}
.empty-state .icon { font-size: 32px; opacity: 0.5; }
</style>
</head>
<body>
<div class="app" id="app">
  <header class="header">
    <h1><span class="accent">RLM</span><span class="sub">Trace Visualizer</span></h1>
    <div class="header-right">
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);" id="gen-time"></span>
      <button class="theme-btn" onclick="toggleTheme()" title="Toggle light/dark theme">🌓 Theme</button>
    </div>
  </header>

  <div class="stats-bar" id="stats-bar"></div>

  <div class="answer-bar" id="answer-bar">
    <div class="label">Final Answer <button class="answer-toggle" id="answer-toggle" style="display:none" onclick="toggleAnswer()">▸ Show full</button></div>
    <div class="value" id="final-answer"></div>
  </div>

  <div class="main-panels">
    <div class="tree-panel">
      <div class="tree-panel-header">◈ Recursive Call Tree</div>
      <div class="tree-content" id="tree-content"></div>
    </div>
    <div class="detail-panel">
      <div class="detail-panel-header">▤ Node Details</div>
      <div class="detail-content" id="detail-content">
        <div class="detail-placeholder">← Select a node from the tree to inspect</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <kbd>↑</kbd> <kbd>↓</kbd> Navigate tree &nbsp;·&nbsp;
    <kbd>←</kbd> <kbd>→</kbd> Collapse / Expand &nbsp;·&nbsp;
    <kbd>Enter</kbd> Select node
  </div>
</div>

<script>
// ---- Embedded trace data ----
const TRACE_DATA = {"response": "Section: Total quarterly revenue reached $473.8 million, reflecting an eleven percent year-over-year increase.\n\nFinancial Performance: Total quarterly revenue reached $473.8 million, reflecting an eleven percent year-over-year increase.\n\nHuman Resources & Talent: Representation of women in senior leadership roles increased to 34 percent, demonstrating continued progress in diversity and inclusion that earned recognition from several external benchmarking organisations.\n\nResearch & Development: The research division demonstrated a 40% reduction in inference latency for production workloads through a successful proof-of-concept on the next-generation platform architecture.\n\nOperations & Infrastructure: The infrastructure team achieved a production server uptime of 99.97%, the highest figure in the company's history and exceeding the 99.9% service-level agreement target.\n\nCustomer Experience: Net Promoter Score reached 72, an all-time high for the company, driven by improved onboarding flow and responsive support experience.\n\nLegal & Compliance: Anti-corruption training was completed by one hundred percent of employees in scope, confirming full regulatory adherence to the updated programme.", "metadata": {"call_tree": {"task_preview": "`rlm_context` is a multi-section corporate annual report. Each section begins with a header block: a line of '=' charact\u2026", "task": "`rlm_context` is a multi-section corporate annual report. Each section begins with a header block: a line of '=' characters, then 'SECTION: Name', then another line of '=' characters.\n\nYour task: Produce a **concise** executive summary \u2014 ONE short paragraph (3-5 sentences) per section. Each paragraph must include the section name and 1-2 of the most important numbers, dates, or metrics from that section. Do NOT include every detail \u2014 only the single most impactful finding per section.\n\nThe final output must be **under 1500 characters total**.\n\nStrategy (you MUST follow this):\n1. Use Python to split `rlm_context` into sections. Look for lines starting with 'SECTION:' to identify section boundaries.\n2. For each section, call llm_call(task, section_text) where task asks the sub-agent    to return a single short paragraph (3-5 sentences) with only the most important finding.    This is REQUIRED \u2014 you cannot summarise without LLM comprehension.\n3. Combine all section summaries into a final executive summary.\n\nIMPORTANT:\n- You MUST use llm_call() or rlm_call() to process each section.\n- Do NOT try to summarise by reading the text yourself \u2014 delegate to sub-agents.\n- Pass section content as context_slice, NOT embedded in the task string.\n- Keep each sub-agent's output SHORT \u2014 3-5 sentences maximum per section.\n", "depth": 0, "context_size": 18982, "duration_s": 1928.694, "response_preview": "Section: Total quarterly revenue reached $473.8 million, reflecting an eleven percent year-over-year increase.\n\nFinancia\u2026", "response": "Section: Total quarterly revenue reached $473.8 million, reflecting an eleven percent year-over-year increase.\n\nFinancial Performance: Total quarterly revenue reached $473.8 million, reflecting an eleven percent year-over-year increase.\n\nHuman Resources & Talent: Representation of women in senior leadership roles increased to 34 percent, demonstrating continued progress in diversity and inclusion that earned recognition from several external benchmarking organisations.\n\nResearch & Development: The research division demonstrated a 40% reduction in inference latency for production workloads through a successful proof-of-concept on the next-generation platform architecture.\n\nOperations & Infrastructure: The infrastructure team achieved a production server uptime of 99.97%, the highest figure in the company's history and exceeding the 99.9% service-level agreement target.\n\nCustomer Experience: Net Promoter Score reached 72, an all-time high for the company, driven by improved onboarding flow and responsive support experience.\n\nLegal & Compliance: Anti-corruption training was completed by one hundred percent of employees in scope, confirming full regulatory adherence to the updated programme.", "llm_requests": [{"phase": "agent_step", "depth": 0, "model_name": "Qwen3.5-35B-A3B-UD-IQ4_NL.gguf", "node_step": 1, "timestamp": 1774615513.09, "messages": [{"role": "system", "content": [{"type": "text", "text": "You are an expert assistant who can solve any task using code blobs. You will be given a task to solve as best you can.\nTo do so, you have been given access to a list of tools: these tools are basically Python functions which you can call with code.\nTo solve the task, you must plan forward to proceed in a series of steps, in a cycle of Thought, Code, and Observation sequences.\n\nAt each step, in the 'Thought:' sequence, you should first explain your reasoning towards solving the task and the tools that you want to use.\nThen in the Code sequence you should write the code in simple Python. The code sequence must be opened with '<code>', and closed with '<\/code>'.\nDuring each intermediate step, you can use 'print()' to save whatever important information you will then need.\nThese print outputs will then appear in the 'Observation:' field, which will be available as input for the next step.\nIn the end you have to return a final answer using the `final_answer` tool.\n\nHere are a few examples using notional tools:\n---\nTask: \"Generate an image of the oldest person in this document.\"\n\nThought: I will proceed step by step and use the following tools: `document_qa` to find the oldest person in the document, then `image_generator` to generate an image according to the answer.\n<code>\nanswer = document_qa(document=document, question=\"Who is the oldest person mentioned?\")\nprint(answer)\n<\/code>\nObservation: \"The oldest person in the document is John Doe, a 55 year old lumberjack living in Newfoundland   // LLM requests
  const requests = node.llm_requests || [];
  if (requests.length > 0) {
    let reqHtml = "";
    requests.forEach((req, i) => {
      reqHtml += renderLLMRequest(req, i);
    });
    h += renderDetailSection(`LLM Requests (${requests.length})`, reqHtml, false);
  }

  panel.innerHTML = h;
}

function renderDetailSection(title, bodyHtml, startOpen) {
  const id = "sec-" + title.replace(/\W+/g, "-").toLowerCase();
  return `<div class="detail-section">
    <div class="detail-section-title" onclick="toggleSection('${id}')">
      <span class="chevron ${startOpen ? '' : 'collapsed'}" id="${id}-chev">▼</span>
      ${esc(title)}
    </div>
    <div class="detail-section-body ${startOpen ? '' : 'collapsed'}" id="${id}-body">
      ${bodyHtml}
    </div>
  </div>`;
}

function toggleSection(id) {
  const chev = document.getElementById(id + "-chev");
  const body = document.getElementById(id + "-body");
  if (!chev || !body) return;
  chev.classList.toggle("collapsed");
  body.classList.toggle("collapsed");
}

function renderLLMRequest(req, index) {
  const phase = req.phase || "unknown";
  const depth = req.depth != null ? req.depth : "?";
  const step = req.node_step != null ? req.node_step : "?";
  const tools = (req.tool_names || []).join(", ") || "none";
  const id = "llm-req-" + index;
  const messages = req.messages || [];

  let h = `<div class="llm-request">`;
  h += `<div class="llm-request-header" onclick="toggleSection('${id}')">`;
  h += `<span class="chevron" id="${id}-chev">▼</span>`;
  h += `<span class="phase-badge ${esc(phase)}">${esc(phase)}</span>`;
  h += `<span>step ${step} · depth ${depth} · tools: ${esc(tools)}</span>`;
  h += `<span style="margin-left:auto;font-size:9px;color:var(--text-muted)">${messages.length} msg${messages.length!==1?"s":""}</span>`;
  h += `</div>`;
  h += `<div class="llm-messages" id="${id}-body">`;

  messages.forEach(msg => {
    h += renderMessage(msg);
  });

  h += `</div></div>`;
  return h;
}

function renderAgentStep(step, index) {
  const stepNum = step.step_number != null ? step.step_number : index + 1;
  const isFinal = step.is_final_answer || false;
  const hasError = !!step.error;
  const id = "agent-step-" + index;
  const badgeCls = hasError ? "error" : (isFinal ? "final" : "");
  const label = hasError ? "error" : (isFinal ? "final answer" : "code step");

  let h = `<div class="agent-step">`;
  h += `<div class="agent-step-header" onclick="toggleSection('${id}')">`;
  h += `<span class="chevron" id="${id}-chev">▼</span>`;
  h += `<span class="step-badge ${badgeCls}">step ${stepNum}</span>`;
  h += `<span>${esc(label)}</span>`;
  h += `</div>`;
  h += `<div class="agent-step-body" id="${id}-body">`;

  // Model output (the LLM's reasoning / plan text)
  if (step.model_output) {
    h += `<div class="agent-step-block-label">Model Output</div>`;
    h += `<div class="agent-step-code">${formatContent(step.model_output)}</div>`;
  }

  // Code action
  if (step.code_action) {
    h += `<div class="agent-step-block-label">Code</div>`;
    h += `<div class="agent-step-code">${esc(step.code_action)}</div>`;
  }

  // Tool calls
  if (step.tool_calls && step.tool_calls.length > 0) {
    h += `<div class="agent-step-block-label">Tool Calls</div>`;
    step.tool_calls.forEach(tc => {
      h += `<div class="agent-step-code">${esc(tc.name || "unknown")}(${esc(JSON.stringify(tc.arguments || {}))})</div>`;
    });
  }

  // Observations (print output from code execution)
  if (step.observations) {
    h += `<div class="agent-step-block-label">Observation</div>`;
    h += `<div class="agent-step-observation">${esc(step.observations)}</div>`;
  }

  // Error
  if (step.error) {
    h += `<div class="agent-step-block-label">Error</div>`;
    h += `<div class="agent-step-observation" style="color:var(--red)">${esc(step.error)}</div>`;
  }

  h += `</div></div>`;
  return h;
}

function renderMessage(msg) {
  const role = (msg.role || "unknown").toLowerCase();
  let displayRole = role;
  let content = msg.content || "";

  // Handle tool calls and tool responses from smolagents
  if (role === "assistant" && msg.tool_calls) {
    displayRole = "tool-call";
    // Show tool call details if content is empty
    if (!content && msg.tool_calls) {
      content = JSON.stringify(msg.tool_calls, null, 2);
    }
  } else if (role === "tool") {
    displayRole = "tool-response";
  }

  const raw = typeof content === "string" ? content : JSON.stringify(content, null, 2);

  let h = `<div class="message-bubble">`;
  h += `<div class="message-role ${esc(displayRole)}">${esc(displayRole)}</div>`;
  h += `<div class="message-content">${formatContent(raw)}</div>`;
  h += `</div>`;
  return h;
}

// ---- Theme toggle ----
let isDark = true;
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle("light", !isDark);
}

// ---- Keyboard navigation ----
document.addEventListener("keydown", function(e) {
  const visible = getVisibleNodes();
  const idx = visible.findIndex(n => n.id === selectedNodeId);

  if (e.key === "ArrowDown" || e.key === "j") {
    e.preventDefault();
    const next = Math.min(idx + 1, visible.length - 1);
    if (next >= 0) selectNode(visible[next].id);
  } else if (e.key === "ArrowUp" || e.key === "k") {
    e.preventDefault();
    const prev = Math.max(idx - 1, 0);
    if (prev >= 0) selectNode(visible[prev].id);
  } else if (e.key === "ArrowLeft" || e.key === "h") {
    if (selectedNodeId && !collapsedNodes.has(selectedNodeId)) {
      const node = getNodeByPath(selectedNodeId);
      if (node && (node.children || []).length > 0) {
        e.preventDefault();
        collapsedNodes.add(selectedNodeId);
        renderTree();
      }
    }
  } else if (e.key === "ArrowRight" || e.key === "l") {
    if (selectedNodeId && collapsedNodes.has(selectedNodeId)) {
      e.preventDefault();
      collapsedNodes.delete(selectedNodeId);
      renderTree();
    }
  } else if (e.key === "Enter") {
    if (selectedNodeId) {
      e.preventDefault();
      renderDetail(selectedNodeId);
    }
  }
});

// ---- Answer bar expand / collapse ----
let answerExpanded = false;
function toggleAnswer() {
  answerExpanded = !answerExpanded;
  const el = document.getElementById("final-answer");
  const btn = document.getElementById("answer-toggle");
  el.classList.toggle("collapsed", !answerExpanded);
  btn.textContent = answerExpanded ? "▾ Show less" : "▸ Show full";
}

// ---- Init ----
renderStats();
(function initAnswer() {
  const el = document.getElementById("final-answer");
  const btn = document.getElementById("answer-toggle");
  const text = response || "(no final answer)";
  el.textContent = text;
  // If the answer is long (> 300 chars) start collapsed with a toggle
  if (response && response.length > 300) {
    el.classList.add("collapsed");
    btn.style.display = "inline-block";
  }
})();
document.getElementById("gen-time").textContent = "2026-03-27 13:17:30 UTC";
renderTree();

// Auto-select root
if (allNodes.length > 0) {
  selectNode(allNodes[0].id);
}
</script>
